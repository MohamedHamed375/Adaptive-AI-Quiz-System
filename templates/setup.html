<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Adaptive Quiz - Setup</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="card">
    <h1>Adaptive Quiz System</h1>
    <p class="muted">
      Configure your session. The AI adapts difficulty using Q-learning.
    </p>

    <label class="label">Number of questions (5–50)</label>
    <input id="nq" type="number" min="5" max="50" value="20" class="input"/>

    <label class="label">Topics</label>
    <div class="checks">
      <label><input type="checkbox" value="RL" checked> Reinforcement Learning</label>
      <label><input type="checkbox" value="GameTheory" checked> Game Theory</label>
      <label><input type="checkbox" value="GAN" checked> GANs</label>
    </div>

    <label class="label">Mode</label>
    <select id="mode" class="input">
      <option value="adaptive">Adaptive (Q-learning)</option>
      <option value="fixed">Fixed Difficulty</option>
    </select>

    <button id="start" class="btn primary">Start Session</button>
    <div id="msg" class="result"></div>
  </div>

  <script>
    document.getElementById("start").addEventListener("click", async ()=>{
      const n_questions = parseInt(document.getElementById("nq").value||"20");

      const topics = Array.from(
        document.querySelectorAll("input[type=checkbox]:checked")
      ).map(c=>c.value);

      if(topics.length===0){
        document.getElementById("msg").textContent =
          "Please select at least one topic.";
        return;
      }

      const mode = document.getElementById("mode").value;

      const res = await fetch("/api/start",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ n_questions, topics, mode })
      });

      const out = await res.json();
      if(out.ok){
        window.location.href="/quiz";
      } else {
        document.getElementById("msg").textContent="Failed to start session.";
      }
    });
  </script>
</body>
</html>
